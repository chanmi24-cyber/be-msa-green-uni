management:
  endpoint:
    gateway:
      enabled: true

spring:
  application:
    name: gateway
  config:
    import:
      - optional:classpath:application-common.yaml
      - optional:classpath:application-auth.yaml
      - optional:file:.env[.properties]
  cloud:
    gateway:
      # 4.0.x 버전 Servlet Gateway의 핵심 설정 프리픽스
      server:
        webmvc:
          actuator:
            enabled: true
          cors: # cors 허용
            configurations:
              '[/**]':
                allowed-origins: [ "http://localhost:5173", "http://localhost:5174" ]
                allowed-methods: [ "*" ]
                allowed-headers: [ "*" ]
                allow-credentials: true
                max-age: 3600

          # 라우팅 설정
          routes:
            - id: auth-service
              uri: http://localhost:8080
              predicates:
                - Path=/api/auth/**

            - id: member-service
              uri: http://localhost:8081
              predicates:
                - Path=/api/member/**, /api/admin/member/**

            - id: core-service
              uri: http://localhost:8082
              predicates:
                - Path=/api/majors/**, /api/lectures/**, /api/courses/**, /api/admin/courses/**, /api/tuitions/**, /api/admin/tuitions/**, /api/scholarships/**, /api/facilities/**, /api/admin/facilities/**, /api/attendances/**, /api/grades/**

            - id: academic-service
              uri: http://localhost:8083
              predicates:
                - Path=/api/announcements/**, /api/admin/announcements/**, /api/notifications/**, /api/schedules/**, /api/admin/schedules/**

server:
  port: 8000