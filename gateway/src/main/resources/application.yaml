management:
  endpoint:
    gateway:
      enabled: true

spring:
  application:
    name: gateway
  config:
    import:
      - optional:classpath:application-common.yaml
      - optional:classpath:application-auth.yaml
      - optional:file:.env[.properties]
  cloud:
    gateway:
      # 4.0.x 버전 Servlet Gateway의 핵심 설정 프리픽스
      server:
        webmvc:
          actuator:
            enabled: true
          cors: # cors 허용
            configurations:
              '[/**]':
                # [수정] ngrok 터널 도메인 추가 — 모바일 테스트 시 CORS 차단 방지
                allowed-origins: [ "http://localhost:5173", "http://localhost:5174", "https://bottom-gleaming-lather.ngrok-free.dev" ]
                allowed-methods: [ "*" ]
                allowed-headers: [ "*" ]
                allow-credentials: true
                max-age: 3600

          # 라우팅 설정
          routes:
            - id: auth-service
              uri: http://${SERVICE_HOST}:${AUTH_PORT}
              predicates:
                - Path=/api/auth/**, /api/code

            - id: member-service
              uri: http://${SERVICE_HOST}:${MEMBER_PORT}
              predicates:
                - Path=/api/member/**, /api/member/**

            - id: core-service
              uri: http://${SERVICE_HOST}:${CORE_PORT}
              predicates:
                - Path=/api/core/**

            - id: academic-service
              uri: http://${SERVICE_HOST}:${ACADEMIC_PORT}
              predicates:
                - Path=/api/academic/**

server:
  port: ${GATEWAY_PORT}
