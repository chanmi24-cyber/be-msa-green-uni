services:
  kafka:
    image: apache/kafka:latest
    container_name: gu-kafka-broker
    ports:
      - "${KAFKA_PORT}:9092" # 환경변수 사용
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      # 중요: 애플리케이션이 접속할 호스트 주소를 환경변수로 동기화
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://${DB_HOST}:${KAFKA_PORT}
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@gu-kafka-broker:9093
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT