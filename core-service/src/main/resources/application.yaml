constants:
  api:
    prefix: /api/core
  enum:
    scan-package: com.green.common

server:
  port: ${CORE_PORT}

spring:
  config:
    import:
      - optional:classpath:application-common.yaml
      - optional:classpath:application-jpa.yaml
      - optional:classpath:application-auth.yaml
      - optional:file:.env[.properties]
  application:
    name: core-service
  datasource:
    driver-class-name: net.sf.log4jdbc.sql.jdbcapi.DriverSpy
    url: jdbc:log4jdbc:mysql://${DB_HOST}:${DB_PORT}/my_gu_core?createDatabaseIfNotExist=true&characterEncoding=UTF-8
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        # 하이버네이트 7의 메타데이터 조회 버그 방지
        temp:
          use_jdbc_metadata_defaults: false
  kafka:
    bootstrap-servers: localhost:${KAFKA_PORT}
    # [발행] Major, Collage 이벤트를 Outbox에 담아 보냄
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    # [수신] Student, Professor, Calendar 캐시를 업데이트
    consumer:
      group-id: core-service-group
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
outbox:
  enabled: true